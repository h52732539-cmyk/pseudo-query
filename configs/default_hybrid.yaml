# ============================================================
# Pseudo-Query Video Retrieval — Default Config
# 支持方案B (SwAV) 和方案C (Hybrid EMA+SwAV)
# ============================================================

# ---------- scheme ----------
scheme: "hybrid"                                       # swav | hybrid

# ---------- paths ----------
data:
  msrvtt_json: "MSR_VTT.json"
  narration_json: "MSRVTT_narration.json"

# ---------- encoder ----------
encoder:
  name: "openai/clip-vit-base-patch32"               # HuggingFace model id
  feature_dim: 512                                   # CLIP ViT-B/32 text dim
  max_token_length: 77                               # CLIP 最大token长度

# ---------- prototype ----------
prototype:
  num_prototypes: 128                                # K — 原型数量

# ---------- model ----------
model:
  aggregation: "attention"                           # attention | mean
  temperature_init: 0.07                             # τ 初始值（可学习）

# ---------- SwAV ----------
swav:
  sinkhorn_eps: 0.05                                 # Sinkhorn 正则化系数
  sinkhorn_iters: 3                                  # Sinkhorn 迭代次数
  temperature: 0.1                                   # SwAV 交叉预测温度
  loss_weight: 0.5                                   # SwAV 损失权重 (α)

# ---------- EMA (仅方案C) ----------
ema:
  decay: 0.999                                       # EMA 衰减系数
  dead_proto_threshold: 100                          # 死原型判定步数阈值

# ---------- training ----------
training:
  seed: 42
  epochs: 40
  batch_size: 128
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_clip: 1.0
  num_workers: 4
  fp16: true
  swav_alpha: 0.5                                    # L_swav 损失权重

# ---------- split (MSR-VTT standard) ----------
split:
  train_end: 6513        # video0 ~ video6512
  val_end: 7010          # video6513 ~ video7009
  # test: video7010 ~ video9999

# ---------- evaluation ----------
eval:
  test_mode: "full"       # full (2990) | 1k-A
