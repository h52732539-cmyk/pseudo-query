scheme: "agc"

encoder:
  name: "openai/clip-vit-base-patch32"
  feature_dim: 512
  hidden_dim: 768
  max_token_length: 77

data:
  msrvtt_json: "/hpc2hdd/home/yuxuanzhao/xuhaodong/MSRVTT/annotation/MSR_VTT.json"
  video_dir: "/hpc2hdd/home/yuxuanzhao/xuhaodong/MSRVTT/videos/all"
  frame_feat_dir: "/hpc2hdd/home/yuxuanzhao/xuhaodong/pseudo-query/AGC/data/msrvtt_clip_frames"
  num_frames: 12

split:
  train_end: 6513
  val_end: 7010

agc:
  num_pseudo_queries: 32
  num_qformer_layers: 4
  num_heads: 8
  ffn_dim: 2048
  dropout: 0.1
  pool_type: "attention"

loss:
  temperature_init: 0.07
  beta_ortho: 0.1
  label_smoothing: 0.1
  logit_scale_max: 20.0

training:
  epochs: 30
  batch_size: 32
  lr: 5.0e-5
  weight_decay: 0.01
  early_stop_patience: 5
  warmup_ratio: 0.1
  gradient_clip: 1.0
  fp16: true
  seed: 42
  num_workers: 4

monitor:
  check_every_n_epochs: 1
  failure_analysis_every_n_epochs: 5
