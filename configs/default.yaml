# ============================================================
# VIB-based Pseudo-Query Video Retrieval — Default Config
# ============================================================

# ---------- paths ----------
data:
  msrvtt_json: "MSR_VTT.json"
  narration_json: "MSRVTT_narration.json"
  prototype_path: "checkpoints/prototypes.pt"       # 离线聚类产出
  token_cache_dir: "cache/token_features"            # 缓存编码后的token特征

# ---------- encoder ----------
encoder:
  name: "openai/clip-vit-base-patch32"               # HuggingFace model id
  feature_dim: 512                                   # CLIP ViT-B/32 text dim
  max_token_length: 77                               # CLIP 最大token长度

# ---------- prototype ----------
prototype:
  method: "gmm"                                      # gmm | kmeans
  candidate_ks: [32, 64, 128, 256, 512]              # GMM+BIC 候选 K
  num_prototypes: 512                                # K — kmeans 模式下使用；gmm 模式自动选择
  kmeans_batch_size: 100000                          # Mini-Batch K-Means 批大小
  kmeans_max_iter: 100

# ---------- model ----------
model:
  aggregation: "attention"                           # attention | mean
  temperature_init: 0.07                             # τ 初始值（可学习）
  variance_penalty: 0.1                              # λ — 方差惩罚系数（当前已停用）
  free_bits: 0.1                                     # KL free-bits 阈值

# ---------- training ----------
training:
  seed: 42
  epochs: 30
  batch_size: 128
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  beta_start: 1.0e-6                                # β-annealing 起始（降低两个数量级）
  beta_end: 1.0e-4                                   # β-annealing 终止（降低两个数量级）
  gradient_clip: 1.0
  num_workers: 4
  fp16: true
  memory_bank_size: 4096                             # Memory Bank 大小（0=禁用）
  use_memory_bank: true                              # 是否启用 Memory Bank

# ---------- split (MSR-VTT standard) ----------
split:
  train_end: 6513        # video0 ~ video6512
  val_end: 7010          # video6513 ~ video7009
  # test: video7010 ~ video9999

# ---------- evaluation ----------
eval:
  test_mode: "full"       # full (2990) | 1k-A
